<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dilux Bakery & Catering</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream: #FDF6EC;
    --brown: #3D1F0D;
    --caramel: #C47C2B;
    --gold: #E8A83E;
    --light: #FAF0E0;
    --soft: #F5E6CC;
    --text: #2A1505;
    --muted: #8B6A4A;
    --white: #FFFFFF;
    --card: #FFFCF5;
    --shadow: rgba(61,31,13,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--brown);
    padding: 20px 20px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 1px;
  }

  header p {
    font-size: 11px;
    color: rgba(232,168,62,0.6);
    margin-top: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Categories ── */
  .categories {
    display: flex;
    gap: 8px;
    padding: 16px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .categories::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: var(--white);
    border: 2px solid transparent;
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .cat-btn.active {
    background: var(--brown);
    color: var(--gold);
    border-color: var(--caramel);
  }

  /* ── Products grid ── */
  .products {
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .product-card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 16px var(--shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    border: 1px solid rgba(196,124,43,0.1);
  }

  .product-card:active { transform: scale(0.97); }

  .product-img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    background: var(--soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .product-info {
    padding: 10px 10px 12px;
  }

  .product-name {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--brown);
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .product-desc {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .product-price {
    font-size: 13px;
    font-weight: 700;
    color: var(--caramel);
  }

  .add-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    background: var(--brown);
    color: var(--gold);
    border: none;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .add-btn:active { background: var(--caramel); }

  /* ── Cart bar ── */
  .cart-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    background: var(--white);
    box-shadow: 0 -4px 24px var(--shadow);
    z-index: 200;
    display: none;
    align-items: center;
    gap: 12px;
  }

  .cart-bar.visible { display: flex; }

  .cart-info {
    flex: 1;
  }

  .cart-count {
    font-size: 12px;
    color: var(--muted);
  }

  .cart-total {
    font-size: 16px;
    font-weight: 700;
    color: var(--brown);
  }

  .cart-btn {
    background: var(--brown);
    color: var(--gold);
    border: none;
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
  }

  .cart-btn:active { background: var(--caramel); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: #E0D5C8;
    border-radius: 4px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 16px;
  }

  /* Cart items */
  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--soft);
  }

  .cart-item-emoji {
    font-size: 32px;
    width: 44px;
    text-align: center;
  }

  .cart-item-info { flex: 1; }

  .cart-item-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--brown);
  }

  .cart-item-price {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .cart-item-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--soft);
    background: var(--cream);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--brown);
    font-weight: 700;
    line-height: 1;
    font-family: 'DM Sans', sans-serif;
  }

  .qty-num {
    font-weight: 700;
    font-size: 15px;
    min-width: 20px;
    text-align: center;
    color: var(--brown);
  }

  /* Order form */
  .form-section {
    margin-top: 20px;
  }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: block;
  }

  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--soft);
    border-radius: 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--cream);
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--caramel); }

  textarea.form-input {
    resize: none;
    height: 80px;
  }

  .delivery-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .delivery-opt {
    border: 2px solid var(--soft);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--cream);
  }

  .delivery-opt.selected {
    border-color: var(--caramel);
    background: var(--soft);
  }

  .delivery-opt span {
    font-size: 20px;
    display: block;
    margin-bottom: 4px;
  }

  .delivery-opt p {
    font-size: 12px;
    font-weight: 600;
    color: var(--brown);
  }

  .delivery-opt small {
    font-size: 10px;
    color: var(--muted);
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--brown);
    color: var(--gold);
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    margin-top: 8px;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }

  .submit-btn:active { background: var(--caramel); }

  .order-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-top: 2px solid var(--soft);
    margin-top: 8px;
  }

  .order-total-label {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
  }

  .order-total-amount {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--brown);
  }

  /* Success screen */
  .success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    min-height: 60vh;
  }

  .success-screen.show { display: flex; }

  .success-icon {
    font-size: 72px;
    margin-bottom: 20px;
    animation: pop 0.5s ease;
  }

  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 10px;
  }

  .success-text {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .empty-cart {
    text-align: center;
    padding: 30px 0;
    color: var(--muted);
  }

  .empty-cart span { font-size: 48px; display: block; margin-bottom: 10px; }

  /* Section title */
  .section-label {
    padding: 16px 16px 0;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--brown);
  }

  .spacer { height: 90px; }
</style>
</head>
<body>

<header>
  <h1>🎂 Dilux Bakery</h1>
  <p>& Catering — Namangan</p>
</header>

<!-- Categories -->
<div class="categories" id="cats"></div>

<!-- Section label -->
<div class="section-label" id="sectionLabel"></div>

<!-- Products -->
<div class="products" id="products"></div>

<div class="spacer"></div>

<!-- Cart bar -->
<div class="cart-bar" id="cartBar">
  <div class="cart-info">
    <div class="cart-count" id="cartCount"></div>
    <div class="cart-total" id="cartTotal"></div>
  </div>
  <button class="cart-btn" onclick="openCart()">🛒 Zakaz berish</button>
</div>

<!-- Modal (Cart + Form) -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>

    <!-- Cart view -->
    <div id="cartView">
      <div class="modal-title">🛒 Savatcha</div>
      <div id="cartItems"></div>

      <div id="orderForm" style="display:none">
        <div class="order-total-row">
          <span class="order-total-label">Jami:</span>
          <span class="order-total-amount" id="modalTotal"></span>
        </div>

        <div class="form-section">
          <label class="form-label">Yetkazib berish usuli</label>
          <div class="delivery-options">
            <div class="delivery-opt selected" id="opt-delivery" onclick="selectDelivery('delivery')">
              <span>🚚</span>
              <p>Yetkazib berish</p>
              <small>1-3 soat</small>
            </div>
            <div class="delivery-opt" id="opt-pickup" onclick="selectDelivery('pickup')">
              <span>🏪</span>
              <p>O'zi olib ketish</p>
              <small>Bepul</small>
            </div>
          </div>

          <label class="form-label">Ismingiz</label>
          <input class="form-input" id="nameInput" type="text" placeholder="Ism Familiya"/>

          <label class="form-label">Telefon raqam</label>
          <input class="form-input" id="phoneInput" type="tel" placeholder="+998 90 123 45 67"/>

          <div id="addressBlock">
            <label class="form-label">Manzil</label>
            <textarea class="form-input" id="addressInput" placeholder="Ko'cha, uy, mo'ljal..."></textarea>
          </div>

          <label class="form-label">Izoh (ixtiyoriy)</label>
          <textarea class="form-input" id="noteInput" placeholder="Qo'shimcha xohishlar..."></textarea>

          <button class="submit-btn" onclick="submitOrder()">✅ Zakaz berish</button>
        </div>
      </div>
    </div>

    <!-- Success -->
    <div class="success-screen" id="successScreen">
      <div class="success-icon">🎉</div>
      <div class="success-title">Zakaz qabul qilindi!</div>
      <p class="success-text">Tez orada admin siz bilan<br/>bog'lanadi. Rahmat!</p>
    </div>
  </div>
</div>

<script>
// ── Ma'lumotlar ──────────────────────────────────────────────
const MENU = {
  "🎂 Tortlar": [
    {name:"Shokoladli tort", price:120000, desc:"Yumshoq shokoladli krem bilan", emoji:"🎂"},
    {name:"Mevali tort",     price:130000, desc:"Yangi mevalar bilan bezatilgan", emoji:"🍓"},
    {name:"Kremli tort",     price:110000, desc:"Klassik oq krem",               emoji:"🍰"},
    {name:"Svadba torti",    price:null,   desc:"Maxsus buyurtma asosida",        emoji:"💍"},
  ],
  "🧁 Kekslar": [
    {name:"Vanilla keks",    price:15000, desc:"1 dona, nafis va yumshoq",    emoji:"🧁"},
    {name:"Shokoladli keks", price:17000, desc:"1 dona, boyitilgan kakao bilan", emoji:"🍫"},
    {name:"Karamelli keks",  price:18000, desc:"1 dona, karamel qatlam bilan",emoji:"🍯"},
  ],
  "🍞 Non mahsulotlari": [
    {name:"Frantsuz baget",  price:12000, desc:"Yangi pishirilgan, xrustli", emoji:"🥖"},
    {name:"Kruassan",        price:14000, desc:"Sariyog'li, qatlamli",       emoji:"🥐"},
    {name:"Qo'shma non",     price:25000, desc:"Har xil to'ldiruvchi bilan", emoji:"🍞"},
  ],
  "🍱 Keytering": [
    {name:"Kichik ziyofat (20 kishi)", price:800000,  desc:"Salat, issiq taom, desert", emoji:"🍱"},
    {name:"O'rta ziyofat (50 kishi)",  price:1800000, desc:"To'liq dasturxon",           emoji:"🥘"},
    {name:"Katta ziyofat (100 kishi)", price:null,    desc:"Maxsus menyu, kelishiladi",  emoji:"🎊"},
  ],
};

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let currentCat = Object.keys(MENU)[0];
let cart = {};
let deliveryType = 'delivery';

// ── Render categories ──────────────────────────────────────
function renderCats() {
  const el = document.getElementById('cats');
  el.innerHTML = Object.keys(MENU).map(cat =>
    `<button class="cat-btn ${cat===currentCat?'active':''}" onclick="selectCat('${cat}')">${cat}</button>`
  ).join('');
}

function selectCat(cat) {
  currentCat = cat;
  renderCats();
  renderProducts();
}

// ── Render products ────────────────────────────────────────
function renderProducts() {
  const el = document.getElementById('products');
  const label = document.getElementById('sectionLabel');
  const items = MENU[currentCat];
  label.textContent = currentCat;

  el.innerHTML = items.map((item, i) => {
    const priceStr = item.price ? formatPrice(item.price) : "Kelishiladi";
    const inCart = cart[currentCat+i];
    return `
      <div class="product-card">
        <div class="product-img">${item.emoji}</div>
        <div class="product-info">
          <div class="product-name">${item.name}</div>
          <div class="product-desc">${item.desc}</div>
          <div class="product-price">${priceStr}</div>
        </div>
        <button class="add-btn" onclick="addToCart('${currentCat}',${i})">
          ${inCart ? '✓' : '+'}
        </button>
      </div>
    `;
  }).join('');
}

// ── Cart logic ─────────────────────────────────────────────
function addToCart(cat, i) {
  const key = cat + i;
  const item = MENU[cat][i];
  if (cart[key]) {
    cart[key].qty += 1;
  } else {
    cart[key] = { ...item, qty: 1, cat, i };
  }
  updateCartBar();
  renderProducts();
}

function changeQty(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  updateCartBar();
  renderCartItems();
  renderProducts();
}

function getTotal() {
  return Object.values(cart).reduce((s, it) => s + (it.price || 0) * it.qty, 0);
}

function getCount() {
  return Object.values(cart).reduce((s, it) => s + it.qty, 0);
}

function formatPrice(p) {
  return p.toLocaleString('uz-UZ') + " so'm";
}

function updateCartBar() {
  const bar = document.getElementById('cartBar');
  const count = getCount();
  if (count === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  document.getElementById('cartCount').textContent = `${count} ta mahsulot`;
  document.getElementById('cartTotal').textContent = formatPrice(getTotal());
}

// ── Modal ──────────────────────────────────────────────────
function openCart() {
  document.getElementById('modalOverlay').classList.add('open');
  renderCartItems();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function renderCartItems() {
  const el = document.getElementById('cartItems');
  const formEl = document.getElementById('orderForm');
  const keys = Object.keys(cart);

  if (keys.length === 0) {
    el.innerHTML = `<div class="empty-cart"><span>🛒</span>Savat bo'sh</div>`;
    formEl.style.display = 'none';
    return;
  }

  el.innerHTML = keys.map(key => {
    const it = cart[key];
    const priceStr = it.price ? formatPrice(it.price * it.qty) : "Kelishiladi";
    return `
      <div class="cart-item">
        <div class="cart-item-emoji">${it.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${it.name}</div>
          <div class="cart-item-price">${priceStr}</div>
        </div>
        <div class="cart-item-controls">
          <button class="qty-btn" onclick="changeQty('${key}',-1)">−</button>
          <span class="qty-num">${it.qty}</span>
          <button class="qty-btn" onclick="changeQty('${key}',1)">+</button>
        </div>
      </div>
    `;
  }).join('');

  formEl.style.display = 'block';
  document.getElementById('modalTotal').textContent = formatPrice(getTotal());
}

// ── Delivery select ────────────────────────────────────────
function selectDelivery(type) {
  deliveryType = type;
  document.getElementById('opt-delivery').classList.toggle('selected', type==='delivery');
  document.getElementById('opt-pickup').classList.toggle('selected', type==='pickup');
  document.getElementById('addressBlock').style.display = type==='delivery' ? 'block' : 'none';
}

// ── Submit order ───────────────────────────────────────────
function submitOrder() {
  const name    = document.getElementById('nameInput').value.trim();
  const phone   = document.getElementById('phoneInput').value.trim();
  const address = document.getElementById('addressInput').value.trim();
  const note    = document.getElementById('noteInput').value.trim();

  if (!name)  { alert("Ismingizni kiriting!"); return; }
  if (!phone) { alert("Telefon raqam kiriting!"); return; }
  if (deliveryType === 'delivery' && !address) { alert("Manzil kiriting!"); return; }

  // Zakaz matni
  const items = Object.values(cart).map(it =>
    `• ${it.emoji} ${it.name} x${it.qty}${it.price ? ' — '+formatPrice(it.price*it.qty) : ''}`
  ).join('\n');

  const orderText = [
    `📦 YANGI ZAKAZ (Web App)`,
    ``,
    `👤 Ism: ${name}`,
    `📱 Tel: ${phone}`,
    `🚚 Usul: ${deliveryType==='delivery' ? 'Yetkazib berish' : "O'zi olib ketish"}`,
    address ? `📍 Manzil: ${address}` : '',
    note    ? `💬 Izoh: ${note}` : '',
    ``,
    `🛒 Mahsulotlar:`,
    items,
    ``,
    `💰 Jami: ${formatPrice(getTotal())}`,
  ].filter(Boolean).join('\n');

  // Telegram WebApp orqali yuborish
  if (tg) {
    tg.sendData(orderText);
  }

  // Success ekran
  document.getElementById('cartView').style.display = 'none';
  document.getElementById('successScreen').classList.add('show');

  // Savatni tozalash
  cart = {};
  updateCartBar();
  renderProducts();

  // 3 soniyadan keyin yopish
  setTimeout(() => {
    if (tg) tg.close();
  }, 3000);
}

// ── Init ───────────────────────────────────────────────────
renderCats();
renderProducts();
</script>
</body>
</html>
